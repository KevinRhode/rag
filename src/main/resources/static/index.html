<!doctype html>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>SecOps RAG console</title>
<style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    body {
        margin: 0; padding: 2rem; max-width: 820px; margin-inline: auto;
        font: 15px/1.55 ui-monospace, "SF Mono", Menlo, Consolas, monospace;
        background: #0d1117; color: #d7dde6;
    }
    h1 { font-size: 1.15rem; letter-spacing: .02em; margin: 0 0 .25rem; }
    .sub { color: #8b97a6; margin: 0 0 1.5rem; font-size: .85rem; }
    .row { display: flex; gap: .5rem; }
    input, button {
        font: inherit; padding: .6rem .7rem; border-radius: 8px;
        border: 1px solid #2a3441; background: #161b22; color: inherit;
    }
    input { flex: 1; }
    button { background: #1f6feb; border-color: #1f6feb; color: #fff; cursor: pointer; }
    button:disabled { opacity: .5; cursor: default; }
    .answer {
        white-space: pre-wrap; background: #161b22; border: 1px solid #2a3441;
        border-radius: 8px; padding: 1rem; margin: 1.25rem 0; min-height: 2rem;
    }
    .label { color: #8b97a6; font-size: .78rem; text-transform: uppercase; letter-spacing: .08em; margin: 1.5rem 0 .5rem; }
    .chunk { border: 1px solid #2a3441; border-radius: 8px; padding: .75rem .9rem; margin-bottom: .6rem; background: #11161d; }
    .chunk-head { display: flex; justify-content: space-between; gap: 1rem; font-size: .8rem; color: #8b97a6; margin-bottom: .4rem; }
    .bar { height: 5px; border-radius: 3px; background: #2a3441; overflow: hidden; margin: .4rem 0 .6rem; }
    .bar > span { display: block; height: 100%; background: #2ea043; }
    .chunk-text { font-size: .85rem; color: #c2cad4; white-space: pre-wrap; }
    .flag { color: #f0883e; font-size: .78rem; margin-top: .5rem; }
    .flag b { color: #ffb454; }
</style>

<h1>SecOps RAG console</h1>
<p class="sub">Ask a security question. The answer is grounded in retrieved chunks, shown below with similarity scores and injection flags.</p>

<div class="row">
    <input id="q" placeholder="e.g. How do I prevent SQL injection?" />
    <button id="go">Ask</button>
</div>

<div class="label">Answer</div>
<div class="answer" id="answer">—</div>

<div class="label" id="rlabel" style="display:none">Retrieved context</div>
<div id="chunks"></div>

<script>
    const q = document.getElementById("q");
    const go = document.getElementById("go");
    const answerEl = document.getElementById("answer");
    const chunksEl = document.getElementById("chunks");
    const rlabel = document.getElementById("rlabel");

    async function ask() {
        const question = q.value.trim();
        if (!question) return;
        go.disabled = true;
        answerEl.textContent = "Thinking…";
        chunksEl.innerHTML = "";
        rlabel.style.display = "none";
        try {
            const res = await fetch("/api/query", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ question }),
            });
            const data = await res.json();
            answerEl.textContent = data.answer || "(no answer)";
            const chunks = data.retrieved || [];
            if (chunks.length) rlabel.style.display = "block";
            chunks.forEach((c, i) => {
                const sim = (c.similarity == null) ? null : c.similarity;
                const pct = (sim == null) ? 0 : Math.max(0, Math.min(100, Math.round(sim * 100)));
                const flags = (c.injectionFlags || []);
                const flagHtml = flags.length
                    ? `<div class="flag">⚠ injection flagged: <b>${flags.map(escapeHtml).join(", ")}</b> — treated as data, not instructions</div>`
                    : "";
                const div = document.createElement("div");
                div.className = "chunk";
                div.innerHTML =
                    `<div class="chunk-head"><span>chunk ${i} · ${escapeHtml(c.source)}</span><span>sim ${sim == null ? "n/a" : sim}</span></div>` +
                    `<div class="bar"><span style="width:${pct}%"></span></div>` +
                    `<div class="chunk-text">${escapeHtml(c.content)}</div>` + flagHtml;
                chunksEl.appendChild(div);
            });
        } catch (e) {
            answerEl.textContent = "Request failed: " + e;
        } finally {
            go.disabled = false;
        }
    }

    function escapeHtml(s) {
        return String(s).replace(/[&<>"']/g, (m) => ({
            "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;",
        }[m]));
    }

    go.addEventListener("click", ask);
    q.addEventListener("keydown", (e) => { if (e.key === "Enter") ask(); });
</script>
