spring:
  application:
    name: rag
  profiles:
    active: local-llm        # default to local; override to switch

  datasource:
    url: jdbc:postgresql://localhost:5432/rag
    username: rag-user
    password: ${DB_PASSWORD:rag-user}   # externalized, local fallback

  ai:
    vectorstore:
      pgvector:
        initialize-schema: true
        index-type: HNSW
        distance-type: COSINE_DISTANCE
        # dimensions + table-name are set per profile

app:
  rag:
    top-k: 5
    rerank: true
    rerank-candidates: 20
    similarity-threshold: 0.0
    injection-defense: true