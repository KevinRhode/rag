spring:
  application:
    name: rag

  # Postgres connection (matches docker-compose.yml)
  datasource:
    url: jdbc:postgresql://localhost:5432/rag
    username: rag-user
    password: rag-user

  ai:
    openai:
      api-key: ${OPENAI_API_KEY}
      chat:
        options:
          model: gpt-5.4-mini   # current cheap workhorse; gpt-4o-mini is legacy
          temperature: 0.1      # if your model rejects temperature, delete this line
      embedding:
        options:
          model: text-embedding-3-small   # 1536 dimensions

    vectorstore:
      pgvector:
        initialize-schema: true     # auto-create extension + vector_store table + index
        index-type: HNSW
        distance-type: COSINE_DISTANCE
        dimensions: 1536            # must match the embedding model's output

# Application-specific RAG knobs
app:
  rag:
    top-k: 5
    similarity-threshold: 0.0   # 0 accepts all; raise to drop weak matches
    injection-defense: true
