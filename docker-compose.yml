services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: rag-user
      POSTGRES_PASSWORD: rag-user
      POSTGRES_DB: rag
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rag-user -d rag"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
