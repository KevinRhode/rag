name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# Least privilege by default; jobs elevate only what they need.
permissions:
  contents: read

jobs:
  build-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: rag-user
          POSTGRES_PASSWORD: rag-user
          POSTGRES_DB: rag
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U rag-user -d rag"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      # Spring AI's OpenAI auto-config requires the property to be present, but
      # contextLoads() makes no API call. A placeholder lets the context start in CI.
      OPENAI_API_KEY: sk-ci-placeholder-not-a-real-key

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build and test
        run: bash ./mvnw -B verify

  trivy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write   # required to upload SARIF to the Security tab
    steps:
      - uses: actions/checkout@v5

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven           # restores ~/.m2/repository keyed on pom hashes

      - name: Prime local Maven repository
        # Pulls every parent/BOM/dependency POM into ~/.m2 so Trivy's Java
        # analyzer reads them from disk and makes zero requests to Central.
        run: ./mvnw -B dependency:go-offline

      - name: Trivy filesystem scan (vulns, secrets, misconfig)
        # Pinned to @master for convenience; pin to a release SHA to harden supply chain.
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scanners: vuln,secret,misconfig
          severity: CRITICAL,HIGH
          format: sarif
          output: trivy-results.sarif

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif

  dependency-review:
    # Flags PRs that add known-vulnerable dependencies.
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/dependency-review-action@v4
